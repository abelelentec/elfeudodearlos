<!DOCTYPE html>
<html lang="ast">

<head>

<meta charset="UTF-8">

<title>Pregoneru Mesón d'Arlós</title>

<link href="https://fonts.googleapis.com/css2?family=Uncial+Antiqua&display=swap" rel="stylesheet">


<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}


body{

width:100vw;
height:100vh;

overflow:hidden;

font-family:Georgia,serif;

color:#2d1b0f;


background:

radial-gradient(circle at 20% 20%,
rgba(110,75,25,.20),
transparent 25%),

radial-gradient(circle at 80% 70%,
rgba(90,60,20,.15),
transparent 30%),

linear-gradient(
#f5e6bc,
#ead7a5
);

position:relative;

}




body::before{

content:"";

position:absolute;

inset:0;


background:

repeating-radial-gradient(
circle at 20% 30%,
rgba(80,60,30,.035),
0,
rgba(80,60,30,.035) 2px,
transparent 4px,
transparent 12px
);


pointer-events:none;

}




body::after{

content:"";

position:absolute;

inset:0;


box-shadow:

inset 0 0 160px rgba(80,50,20,.35);


pointer-events:none;

}




.quemado{

animation:

quemarPergamino 1.1s ease;

}



@keyframes quemarPergamino{


0%{
filter:brightness(1.8) sepia(.5);
}


50%{
filter:brightness(1.25) sepia(.25);
}


100%{
filter:brightness(1) sepia(0);
}

}






.llamaPantalla{


position:absolute;

inset:0;


background:

radial-gradient(
circle,
rgba(205,168,90,.45),
transparent 35%
);


opacity:0;

pointer-events:none;

z-index:1;

}





.llamaPantalla.activa{

animation:tintaMagica 1s ease;

}




@keyframes tintaMagica{


0%{

opacity:.8;

transform:scale(.7);

}



100%{

opacity:0;

transform:scale(1.4);

}

}







.contenido{


position:relative;

z-index:2;


height:100%;


display:grid;


grid-template-columns:75% 25%;


}





.principal{


display:flex;


flex-direction:column;


justify-content:center;


align-items:center;


}






.titulo{


font-family:'Uncial Antiqua',Georgia,serif;


font-size:38px;


color:#5b2010;


margin-bottom:25px;


text-shadow:

1px 1px 0 #cda85a;


}





.numero{


font-size:420px;


font-weight:bold;


line-height:.9;


letter-spacing:5px;


color:#5b2010;



text-shadow:


3px 3px 0 #cda85a,

0 0 25px rgba(91,32,16,.25);


}





.revelar{

animation:

aparecePergamino .9s ease;

}






@keyframes aparecePergamino{


0%{

opacity:0;

transform:scale(.5);

filter:blur(8px);

}



100%{

opacity:1;

transform:scale(1);

filter:blur(0);

}

}






.mensaje{


font-size:55px;


text-align:center;


color:#4a2b10;


margin-top:25px;


}







.lateral{


padding:35px;


border-left:

3px solid rgba(90,50,10,.3);


}







.lateral h2{


font-family:'Uncial Antiqua',Georgia,serif;


text-align:center;


font-size:35px;


color:#5b2010;


margin-bottom:20px;


}





.lista{


font-size:65px;


text-align:center;


}






.lista div{


padding:8px;


border-bottom:

2px dashed #b58c49;


}






.entrada{


position:absolute;


bottom:55px;


left:0;


width:100%;


text-align:center;


font-size:28px;


color:#6b4a1d;


z-index:5;


}





#escribiendo{


font-weight:bold;


color:#5b2010;


letter-spacing:8px;


}





#voz{


position:absolute;

bottom:15px;

left:15px;

z-index:10;

background:#f5e6bc;

color:#5b2010;

border:2px solid #8a6432;

padding:5px;

border-radius:8px;

font-family:Georgia;

}





.pie{


position:absolute;


bottom:15px;


width:100%;


text-align:center;


font-size:25px;


color:#6b4a1d;


z-index:3;


}


</style>

</head>





<body>



<div class="llamaPantalla" id="llama"></div>




<div class="contenido">





<div class="principal">


<div class="titulo">

🔔 EL PREGONERU ANUNCIA

</div>




<div id="numero" class="numero">

---

</div>




<div id="mensaje" class="mensaje">

Esperando encargu...

</div>



</div>








<div class="lateral">


<h2>

⚔ LLAMAOS

</h2>



<div id="lista" class="lista">

</div>



</div>





</div>





<div class="entrada">

✒ Introducir pergamín:

<span id="escribiendo"></span>

</div>




<select id="voz"></select>





<div class="pie">

⚔ Mesón d'Arlós · Exconxuraos ⚔

</div>









<script>


let llamados=[];

let numeroEntrada="";





function cargarVoces(){


let selector =
document.getElementById("voz");


let voces =
speechSynthesis.getVoices();


selector.innerHTML="";



voces.forEach((v,i)=>{


let op =
document.createElement("option");


op.value=i;

op.textContent=v.name;


selector.appendChild(op);


});


}



speechSynthesis.onvoiceschanged=cargarVoces;

cargarVoces();






document.addEventListener(

"keydown",

function(e){





if(e.key >= "0" && e.key <= "9"){


numeroEntrada += e.key;


document.getElementById("escribiendo")

.innerHTML=numeroEntrada;


}






if(e.key==="Backspace"){


numeroEntrada =
numeroEntrada.slice(0,-1);


document.getElementById("escribiendo")

.innerHTML=numeroEntrada;


}







if(e.key==="Enter"){



if(numeroEntrada!=""){


llamar(numeroEntrada);


numeroEntrada="";


document.getElementById("escribiendo")

.innerHTML="";


}


}



});








function llamar(n){



let numero =

document.getElementById("numero");






numero.innerHTML=n;






numero.classList.remove("revelar");


void numero.offsetWidth;


numero.classList.add("revelar");






document.body.classList.remove("quemado");


void document.body.offsetWidth;


document.body.classList.add("quemado");







let llama=

document.getElementById("llama");



llama.classList.remove("activa");


void llama.offsetWidth;


llama.classList.add("activa");








document.getElementById("mensaje")

.innerHTML=

"YA PUEDES RECOYER<br>LA TO VIANDA";






llamados.unshift(n);




if(llamados.length>6){

llamados.pop();

}





actualizar();



hablarPedido(n);



}







function actualizar(){


let html="";



llamados.forEach(x=>{


html+=`

<div>${x}</div>

`;

});


document.getElementById("lista")

.innerHTML=html;


}








function hablarPedido(numero){



let texto =


 numero ;

112


let voz =

new SpeechSynthesisUtterance(texto);





let voces =
speechSynthesis.getVoices();



let seleccion =
document.getElementById("voz").value;




if(voces[seleccion]){

voz.voice=voces[seleccion];

}





voz.lang="es-ES";


voz.rate=.75;


voz.pitch=.6;


voz.volume=1;





speechSynthesis.cancel();


speechSynthesis.speak(voz);



}



</script>






</body>

</html>
